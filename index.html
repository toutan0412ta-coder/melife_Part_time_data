<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>非常勤講師用 業務ページ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary:    #2c5f8a;
      --primary-lt: #3a7abf;
      --accent:     #e8a020;
      --accent-lt:  #f5c050;
      --bg:         #f0f4f8;
      --card:       #ffffff;
      --border:     #ccd8e4;
      --text:       #2d3748;
      --text-sub:   #718096;
      --danger:     #e53e3e;
      --success:    #38a169;
      --radius:     10px;
      --shadow:     0 2px 12px rgba(44,95,138,.12);
    }
    body {
      font-family: "Meiryo UI","メイリオ","Yu Gothic UI",sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== ヘッダー ===== */
    header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-lt) 100%);
      color: #fff;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      box-shadow: 0 3px 10px rgba(0,0,0,.2);
      flex-shrink: 0;
    }
    header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: .04em; text-shadow: 0 1px 3px rgba(0,0,0,.3); white-space: nowrap; }
    .header-right { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
    .header-date  { font-size: .9rem; font-weight: 600; white-space: nowrap; }
    .weather-widget {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,.15); border-radius: 20px;
      padding: 6px 14px; backdrop-filter: blur(4px);
    }
    .weather-icon { font-size: 2rem; line-height: 1; }
    .weather-temp { font-size: 1.05rem; font-weight: 700; }
    .weather-desc { font-size: .75rem; opacity: .9; }
    #settings-btn {
      background: rgba(255,255,255,.18);
      border: 2px solid rgba(255,255,255,.45);
      color: #fff; border-radius: 8px;
      width: 40px; height: 40px; font-size: 1.25rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .15s; flex-shrink: 0;
    }
    #settings-btn:hover { background: rgba(255,255,255,.32); transform: rotate(25deg); }

    /* ===== Firebase 接続ステータス ===== */
    .firebase-status {
      display: flex; align-items: center; gap: 6px;
      font-size: .72rem; font-weight: 600;
      background: rgba(0,0,0,.18); border-radius: 12px;
      padding: 3px 10px; white-space: nowrap;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #fbbf24; flex-shrink: 0;
      transition: background .4s;
    }
    .status-dot.connected    { background: #34d399; }
    .status-dot.disconnected { background: #f87171; }

    /* ===== フォルダセクション ===== */
    .folder-section {
      background: var(--card); border-bottom: 2px solid var(--border);
      padding: 10px 20px; flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(44,95,138,.08); position: relative;
    }
    .folder-section-inner { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .folder-section-label  { font-size: .8rem; font-weight: 700; color: var(--primary); white-space: nowrap; }
    .folder-divider        { width: 1px; height: 36px; background: var(--border); flex-shrink: 0; }
    .btn-grid              { display: flex; flex-wrap: wrap; gap: 10px; flex: 1; }
    .folder-btn {
      display: flex; align-items: center; gap: 8px;
      background: linear-gradient(145deg, var(--primary) 0%, var(--primary-lt) 100%);
      color: #fff; border: none; border-radius: 8px;
      padding: 10px 18px; font-size: .92rem; font-weight: 600;
      cursor: pointer; transition: transform .15s, box-shadow .15s;
      box-shadow: 0 3px 8px rgba(44,95,138,.28);
      font-family: inherit; white-space: nowrap; position: relative;
    }
    .folder-btn .btn-icon { font-size: 1.25rem; }
    .folder-btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(44,95,138,.4); }
    .folder-btn:active { transform: translateY(0); }
    .folder-btn.web-btn {
      background: linear-gradient(145deg, var(--accent) 0%, var(--accent-lt) 100%);
      box-shadow: 0 3px 8px rgba(232,160,32,.35);
    }
    .folder-btn.web-btn:hover { box-shadow: 0 6px 16px rgba(232,160,32,.5); }

    /* ===== 出勤簿サブメニュー ===== */
    .syukkinbo-wrap { position: relative; }
    .teacher-submenu {
      display: none; position: absolute; top: calc(100% + 8px); left: 0;
      background: #fff; border: 1.5px solid var(--border);
      border-radius: 10px; box-shadow: 0 6px 24px rgba(44,95,138,.22);
      z-index: 150; min-width: 160px; overflow: hidden;
      animation: subMenuIn .15s ease;
    }
    @keyframes subMenuIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
    .teacher-submenu.open { display: block; }
    .submenu-header { background: var(--primary); color: #fff; font-size: .76rem; font-weight: 700; padding: 7px 13px; }
    .submenu-item {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 14px; font-size: .88rem; color: var(--text);
      cursor: pointer; transition: background .13s; border-bottom: 1px solid #edf2f7;
    }
    .submenu-item:last-child { border-bottom: none; }
    .submenu-item:hover { background: #ebf4ff; color: var(--primary); }
    .submenu-no-teacher { padding: 12px 14px; font-size: .82rem; color: var(--text-sub); text-align: center; }

    /* ===== タブ ===== */
    .tab-bar {
      background: var(--card); border-bottom: 3px solid var(--primary);
      padding: 0 20px; display: flex; align-items: flex-end;
      gap: 4px; flex-shrink: 0;
    }
    .tab-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 10px 22px 9px; border: 2px solid transparent;
      border-bottom: none; border-radius: 8px 8px 0 0;
      background: #edf2f7; color: var(--text-sub);
      font-family: inherit; font-size: .9rem; font-weight: 600;
      cursor: pointer; transition: background .18s, color .18s;
      position: relative; bottom: -1px;
    }
    .tab-btn:hover { background: #dbeafe; color: var(--primary); }
    .tab-btn.active {
      background: var(--card); color: var(--primary);
      border-color: var(--primary); border-bottom-color: var(--card);
      box-shadow: 0 -2px 8px rgba(44,95,138,.1); z-index: 1;
    }
    .tab-badge { background: var(--accent); color: #fff; border-radius: 10px; padding: 1px 7px; font-size: .67rem; font-weight: 700; }
    .tab-btn.active .tab-badge { background: var(--primary); }

    /* ===== iframe ===== */
    .iframe-container { flex: 1; overflow: hidden; position: relative; }
    .tab-frame { position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: none; background: var(--bg); }
    .tab-frame.active { display: block; }

    /* ===== 設定モーダル ===== */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 200;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 14px;
      width: min(760px,100%); max-height: 90vh; overflow-y: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,.3); animation: modalIn .2s ease;
    }
    @keyframes modalIn { from{opacity:0;transform:scale(.93) translateY(-10px)} to{opacity:1;transform:scale(1) translateY(0)} }
    .modal-header {
      background: linear-gradient(135deg, var(--primary), var(--primary-lt));
      color: #fff; padding: 15px 22px; border-radius: 14px 14px 0 0;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 1;
    }
    .modal-header h2 { font-size: 1rem; font-weight: 700; }
    .modal-close {
      background: rgba(255,255,255,.2); border: none; color: #fff;
      font-size: 1.1rem; width: 30px; height: 30px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .modal-close:hover { background: rgba(255,255,255,.4); }
    .modal-body { padding: 20px 22px; }
    .modal-section-title {
      font-size: .88rem; font-weight: 700; color: var(--primary);
      border-bottom: 2px solid var(--primary); padding-bottom: 4px;
      margin: 20px 0 12px;
    }
    .modal-section-title:first-child { margin-top: 0; }

    .teacher-cfg-table { width: 100%; border-collapse: collapse; font-size: .86rem; }
    .teacher-cfg-table th {
      background: #edf2f7; color: var(--primary);
      padding: 7px 10px; font-weight: 700;
      border: 1px solid var(--border); text-align: left;
    }
    .teacher-cfg-table td { padding: 6px 8px; border: 1px solid var(--border); vertical-align: middle; }
    .teacher-cfg-table input[type="text"] {
      width: 100%; border: 1px solid var(--border); border-radius: 5px;
      padding: 5px 8px; font-family: inherit; font-size: .85rem; color: var(--text);
    }
    .teacher-cfg-table input:focus { outline: none; border-color: var(--primary-lt); box-shadow: 0 0 0 3px rgba(58,122,191,.15); }
    .teacher-row-del {
      background: none; border: none; color: var(--danger);
      font-size: 1.1rem; cursor: pointer; padding: 2px 5px;
      border-radius: 4px; transition: background .13s; line-height: 1;
    }
    .teacher-row-del:hover { background: #fed7d7; }
    .add-teacher-btn {
      margin-top: 9px; background: var(--primary); color: #fff;
      border: none; border-radius: 6px; padding: 6px 14px;
      font-family: inherit; font-size: .82rem; cursor: pointer; transition: background .15s;
    }
    .add-teacher-btn:hover { background: var(--primary-lt); }

    .settings-grid { display: grid; grid-template-columns: 120px 1fr; gap: 9px 12px; align-items: center; }
    .settings-grid label { font-size: .85rem; font-weight: 600; color: var(--text-sub); text-align: right; }
    .settings-grid input {
      width: 100%; border: 1px solid var(--border); border-radius: 6px;
      padding: 6px 9px; font-family: inherit; font-size: .85rem; color: var(--text);
    }
    .settings-grid input:focus { outline: none; border-color: var(--primary-lt); box-shadow: 0 0 0 3px rgba(58,122,191,.15); }

    .modal-footer {
      padding: 13px 22px; border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 10px;
      position: sticky; bottom: 0; background: #fff; border-radius: 0 0 14px 14px;
    }
    .btn-save   { background: var(--primary); color: #fff; border: none; border-radius: 7px; padding: 9px 24px; font-family: inherit; font-size: .92rem; font-weight: 700; cursor: pointer; transition: background .15s; }
    .btn-save:hover { background: var(--primary-lt); }
    .btn-cancel { background: #edf2f7; color: var(--text); border: none; border-radius: 7px; padding: 9px 20px; font-family: inherit; font-size: .92rem; cursor: pointer; transition: background .15s; }
    .btn-cancel:hover { background: #e2e8f0; }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #38a169; color: #fff; padding: 11px 20px;
      border-radius: 8px; font-size: .88rem; font-weight: 600;
      box-shadow: 0 4px 14px rgba(0,0,0,.2); z-index: 300;
      opacity: 0; transform: translateY(10px);
      transition: opacity .3s, transform .3s; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    @media(max-width:640px){
      header{flex-direction:column;align-items:flex-start}
      .settings-grid{grid-template-columns:1fr}
      .settings-grid label{text-align:left}
    }
  </style>
</head>
<body>

<header>
  <h1>📚 非常勤講師用 業務ページ</h1>
  <div class="header-right">
    <div class="firebase-status">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-label">接続中...</span>
    </div>
    <div class="header-date" id="header-date">読み込み中...</div>
    <div class="weather-widget">
      <span class="weather-icon" id="w-icon">⏳</span>
      <div>
        <div class="weather-temp" id="w-temp">--℃</div>
        <div class="weather-desc" id="w-desc">取得中...</div>
      </div>
    </div>
    <button id="settings-btn" onclick="openSettings()" title="設定">⚙</button>
  </div>
</header>

<div class="folder-section">
  <div class="folder-section-inner">
    <div class="folder-section-label">📂 フォルダを開く</div>
    <div class="folder-divider"></div>
    <div class="btn-grid" id="btn-grid"></div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="gyomu" onclick="switchTab('gyomu')">
    <span>📋</span>業務内容<span class="tab-badge">連絡・タスク</span>
  </button>
  <button class="tab-btn" data-tab="kouza" onclick="switchTab('kouza')">
    <span>🎓</span>講座情報<span class="tab-badge">カリキュラム</span>
  </button>
</div>

<div class="iframe-container">
  <iframe id="frame-gyomu" class="tab-frame active" src="gyomu.html" title="業務内容"></iframe>
  <iframe id="frame-kouza" class="tab-frame"        src="kouza.html" title="講座情報"></iframe>
</div>

<!-- 設定モーダル -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <div class="modal-header">
      <h2>⚙ 設定</h2>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-section-title">👤 講師・フォルダ設定</div>
      <table class="teacher-cfg-table">
        <thead>
          <tr>
            <th style="width:32px"></th>
            <th style="width:36%">講師名</th>
            <th>出勤簿フォルダパス</th>
          </tr>
        </thead>
        <tbody id="teacher-cfg-tbody"></tbody>
      </table>
      <button class="add-teacher-btn" onclick="addTeacherRow()">＋ 講師を追加</button>

      <div class="modal-section-title">🌐 WEB管理システム URL</div>
      <div class="settings-grid">
        <label>URL</label>
        <input type="url" id="cfg-web-url" placeholder="https://example.com">
      </div>

      <div class="modal-section-title">🌤 天気取得位置</div>
      <div class="settings-grid">
        <label>緯度</label>
        <input type="text" id="cfg-lat"  placeholder="例: 35.6895">
        <label>経度</label>
        <input type="text" id="cfg-lon"  placeholder="例: 139.6917">
        <label>地名表示</label>
        <input type="text" id="cfg-city" placeholder="例: 東京">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeSettings()">閉じる</button>
      <button class="btn-save"   onclick="saveSettings()">💾 保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK（ESM） -->
<script type="module">
import { initializeApp }                       from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc,
         onSnapshot, enableIndexedDbPersistence }
                                               from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

/* ================================================
   Firebase 初期化
================================================ */
const firebaseConfig = {
  apiKey:            "AIzaSyDYQ-GiOKMXlluilrkn0_V07VlA-1Oi9oc",
  authDomain:        "melife-part-time-data.firebaseapp.com",
  projectId:         "melife-part-time-data",
  storageBucket:     "melife-part-time-data.firebasestorage.app",
  messagingSenderId: "516260260081",
  appId:             "1:516260260081:web:7ec332ba2a4e8faaf5a150"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

/* オフライン永続化（IndexedDB キャッシュ） */
enableIndexedDbPersistence(db).catch(() => {});

/* ================================================
   接続ステータス管理
================================================ */
const statusDot   = document.getElementById("status-dot");
const statusLabel = document.getElementById("status-label");

function setStatus(state) {
  statusDot.className   = "status-dot " + state;
  statusLabel.textContent = state === "connected" ? "同期中" : state === "disconnected" ? "オフライン" : "接続中...";
}

/* Firestore の到達確認（初回 get で判定） */
async function checkConnection() {
  try {
    await getDoc(doc(db, "settings", "config"));
    setStatus("connected");
  } catch {
    setStatus("disconnected");
  }
}
checkConnection();

/* ================================================
   設定の Firestore 保存・読み込み
   コレクション: settings / ドキュメント: config
================================================ */
const CONFIG_DOC = doc(db, "settings", "config");

const DEFAULT_CFG = {
  teachers: Array.from({ length: 3 }, () => ({ name: "", folder: "" })),
  lat: "35.6895", lon: "139.6917", city: "東京", webUrl: ""
};

let currentCfg = { ...DEFAULT_CFG };

/* Firestore からリアルタイム購読 */
onSnapshot(CONFIG_DOC, snap => {
  if (snap.exists()) {
    currentCfg = { ...DEFAULT_CFG, ...snap.data() };
  }
  buildFolderButtons();
  /* 子 iframe に設定変更を通知 */
  notifyGyomuFrame("config_updated", currentCfg);
});

async function saveConfigToFirestore(cfg) {
  try {
    await setDoc(CONFIG_DOC, cfg, { merge: true });
    setStatus("connected");
    return true;
  } catch(e) {
    setStatus("disconnected");
    showToast("⚠ 保存に失敗しました: " + e.message, "#e53e3e", 4000);
    return false;
  }
}

/* ================================================
   グローバルに公開（設定モーダルから呼ぶ）
================================================ */
window._db          = db;
window._currentCfg  = () => currentCfg;
window._saveCfg     = saveConfigToFirestore;

/* ================================================
   iframe 通知
================================================ */
function notifyGyomuFrame(type, payload) {
  const f = document.getElementById("frame-gyomu");
  if (f && f.contentWindow) f.contentWindow.postMessage({ type, payload }, "*");
}
window.notifyGyomuFrame = notifyGyomuFrame;

/* ================================================
   タブ切替
================================================ */
window.switchTab = function(tabId) {
  document.querySelectorAll(".tab-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.tab === tabId)
  );
  document.querySelectorAll(".tab-frame").forEach(f =>
    f.classList.toggle("active", f.id === `frame-${tabId}`)
  );
  closeTeacherSubmenu();
};

/* ================================================
   日付ヘッダー
================================================ */
function updateDateHeader() {
  const now  = new Date();
  const DAYS = ["日","月","火","水","木","金","土"];
  const y=now.getFullYear(), m=String(now.getMonth()+1).padStart(2,"0"),
        d=String(now.getDate()).padStart(2,"0"), w=DAYS[now.getDay()],
        hh=String(now.getHours()).padStart(2,"0"), mi=String(now.getMinutes()).padStart(2,"0");
  document.getElementById("header-date").textContent = `${y}年${m}月${d}日（${w}）${hh}:${mi}`;
}
setInterval(updateDateHeader, 30000);

/* ================================================
   天気
================================================ */
const WMO_LABEL={0:"晴れ",1:"ほぼ晴れ",2:"一部曇り",3:"曇り",45:"霧",48:"霧氷",51:"霧雨(弱)",53:"霧雨",55:"霧雨(強)",61:"小雨",63:"雨",65:"大雨",71:"小雪",73:"雪",75:"大雪",77:"霰",80:"にわか雨(弱)",81:"にわか雨",82:"にわか雨(強)",85:"にわか雪(弱)",86:"にわか雪(強)",95:"雷雨",96:"雷雨(雹あり)",99:"激しい雷雨"};
const WMO_ICON ={0:"☀️",1:"🌤",2:"⛅",3:"☁️",45:"🌫",48:"🌫",51:"🌦",53:"🌦",55:"🌧",61:"🌧",63:"🌧",65:"🌧",71:"🌨",73:"❄️",75:"❄️",77:"🌨",80:"🌦",81:"🌧",82:"🌧",85:"🌨",86:"❄️",95:"⛈",96:"⛈",99:"⛈"};

async function fetchWeather() {
  const lat  = parseFloat(currentCfg.lat)  || 35.6895;
  const lon  = parseFloat(currentCfg.lon)  || 139.6917;
  const city = currentCfg.city || "東京";
  try {
    const res  = await fetch(`https://api.open-meteo.com/v1/jma?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,relative_humidity_2m&timezone=Asia%2FTokyo`);
    if (!res.ok) throw new Error();
    const cur  = (await res.json()).current;
    document.getElementById("w-icon").textContent = WMO_ICON[cur.weather_code] ?? "🌡";
    document.getElementById("w-temp").textContent = `${Math.round(cur.temperature_2m)}℃`;
    document.getElementById("w-desc").textContent = `${city} ${WMO_LABEL[cur.weather_code]??""} 湿度${cur.relative_humidity_2m}%`;
  } catch {
    document.getElementById("w-icon").textContent="🌡";
    document.getElementById("w-temp").textContent="--℃";
    document.getElementById("w-desc").textContent="天気取得失敗";
  }
}

/* ================================================
   ユーティリティ
================================================ */
function escHtml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

/* ================================================
   フォルダボタン生成
================================================ */
const FOLDER_BUTTONS_DEF = [
  { label:"シフト希望表", key:"shift_kibosho", icon:"📅" },
  { label:"次講座",       key:"next_kouza",    icon:"📖" },
  { label:"抜き出し",     key:"nukidashi",     icon:"🔍" },
  { label:"明細データ",   key:"meisai_data",   icon:"📊" },
];

function buildFolderButtons() {
  const grid = document.getElementById("btn-grid");
  grid.innerHTML = "";

  /* 出勤簿（サブメニュー） */
  const swrap   = document.createElement("div");
  swrap.className = "syukkinbo-wrap";
  const sbtn    = document.createElement("button");
  sbtn.className = "folder-btn";
  sbtn.innerHTML = `<span class="btn-icon">📋</span>出勤簿 ▾`;
  sbtn.addEventListener("click", e => { e.stopPropagation(); toggleTeacherSubmenu(swrap); });

  const submenu = document.createElement("div");
  submenu.className = "teacher-submenu";
  const hd = document.createElement("div");
  hd.className = "submenu-header"; hd.textContent = "👤 講師を選択";
  submenu.appendChild(hd);

  const teachers = (currentCfg.teachers || []).filter(t => t.name?.trim());
  if (!teachers.length) {
    const em = document.createElement("div");
    em.className = "submenu-no-teacher"; em.textContent = "講師が未登録です";
    submenu.appendChild(em);
  } else {
    teachers.forEach(t => {
      const item = document.createElement("div");
      item.className = "submenu-item";
      item.innerHTML = `<span>📋</span>${escHtml(t.name)}`;
      item.addEventListener("click", () => {
        const folder = (t.folder || "").trim();
        if (!folder) showToast(`⚠ ${t.name} のフォルダパスが未設定です`, "#d69e2e", 3200);
        else location.href = "openfolder:" + encodeURIComponent(folder);
        closeTeacherSubmenu();
      });
      submenu.appendChild(item);
    });
  }
  swrap.appendChild(sbtn); swrap.appendChild(submenu);
  grid.appendChild(swrap);

  /* 通常ボタン */
  FOLDER_BUTTONS_DEF.forEach(({ label, key, icon }) => {
    const btn = document.createElement("button");
    btn.className = "folder-btn";
    btn.innerHTML = `<span class="btn-icon">${icon}</span>${label}`;
    btn.addEventListener("click", () => { location.href = "openfolder:" + encodeURIComponent(key); closeTeacherSubmenu(); });
    grid.appendChild(btn);
  });

  /* WEBボタン */
  const wb = document.createElement("button");
  wb.className = "folder-btn web-btn";
  wb.innerHTML = `<span class="btn-icon">🌐</span>WEB管理システム`;
  wb.addEventListener("click", () => {
    const url = (currentCfg.webUrl || "").trim();
    if (!url) { showToast("⚠ WEB管理システムのURLが未設定です", "#d69e2e", 3200); return; }
    window.open(url, "_blank", "noopener,noreferrer"); closeTeacherSubmenu();
  });
  grid.appendChild(wb);
}

function toggleTeacherSubmenu(wrap) {
  const m = wrap.querySelector(".teacher-submenu");
  const wasOpen = m.classList.contains("open");
  closeTeacherSubmenu();
  if (!wasOpen) m.classList.add("open");
}
window.closeTeacherSubmenu = function() {
  document.querySelectorAll(".teacher-submenu.open").forEach(m => m.classList.remove("open"));
};
document.addEventListener("click", () => window.closeTeacherSubmenu());

/* ================================================
   設定モーダル
================================================ */
window.openSettings = function() {
  const cfg = currentCfg;
  buildTeacherCfgRows(cfg.teachers || []);
  document.getElementById("cfg-web-url").value = cfg.webUrl || "";
  document.getElementById("cfg-lat").value     = cfg.lat    || "35.6895";
  document.getElementById("cfg-lon").value     = cfg.lon    || "139.6917";
  document.getElementById("cfg-city").value    = cfg.city   || "東京";
  document.getElementById("settings-modal").classList.add("open");
};
window.closeSettings = function() {
  document.getElementById("settings-modal").classList.remove("open");
};

window.saveSettings = async function() {
  const cfg = {
    teachers: collectTeachers(),
    webUrl:   document.getElementById("cfg-web-url").value.trim(),
    lat:      document.getElementById("cfg-lat").value.trim(),
    lon:      document.getElementById("cfg-lon").value.trim(),
    city:     document.getElementById("cfg-city").value.trim(),
  };
  const ok = await saveConfigToFirestore(cfg);
  if (ok) {
    closeSettings();
    fetchWeather();
    showToast("✅ 設定を Firestore に保存しました");
  }
};

function buildTeacherCfgRows(teachers) {
  const tbody = document.getElementById("teacher-cfg-tbody");
  tbody.innerHTML = "";
  (teachers.length ? teachers : Array.from({length:3},()=>({name:"",folder:""}))).forEach(t =>
    addTeacherRowWith(t.name||"", t.folder||"")
  );
}
window.addTeacherRow = function() { addTeacherRowWith("",""); };

function addTeacherRowWith(name, folder) {
  const tbody = document.getElementById("teacher-cfg-tbody");
  const tr    = document.createElement("tr");
  tr.innerHTML = `
    <td style="text-align:center;">
      <button class="teacher-row-del" onclick="this.closest('tr').remove()" title="削除">🗑</button>
    </td>
    <td><input type="text" class="t-name"   value="${escHtml(name)}"   placeholder="例：山田 太郎"></td>
    <td><input type="text" class="t-folder" value="${escHtml(folder)}" placeholder="例：C:\\Users\\...\\出勤簿\\山田"></td>`;
  tbody.appendChild(tr);
}

function collectTeachers() {
  return [...document.querySelectorAll("#teacher-cfg-tbody tr")].map(tr => ({
    name:   tr.querySelector(".t-name")?.value.trim()   || "",
    folder: tr.querySelector(".t-folder")?.value.trim() || "",
  })).filter(t => t.name || t.folder);
}

document.getElementById("settings-modal").addEventListener("click", function(e){
  if(e.target===this) window.closeSettings();
});

/* ================================================
   トースト
================================================ */
window.showToast = function(msg, bg, duration) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.background = bg || "#38a169";
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), duration || 2800);
};

/* ================================================
   初期化
================================================ */
updateDateHeader();
fetchWeather();
setInterval(fetchWeather, 600000); /* 10分ごとに更新 */
</script>
</body>
</html>
